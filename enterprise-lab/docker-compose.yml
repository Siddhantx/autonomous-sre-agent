# docker-compose.yml
# Master simulation platform for APOE Enterprise Lab
# Models a typical financial enterprise transaction processing system.
#
# Hardening notes:
# - Image tags are pinned to exact versions. For production, pin by digest:
#   docker compose pull && docker inspect --format='{{index .RepoDigests 0}}' <image>
# - Every service has a healthcheck, a resource limit and a stop grace period.
# - APOE_API_KEY is passed through from the host env — never hardcoded here.

x-python-health: &py-health
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  # ==========================================
  # PERSISTENCE & DATA PIPELINES
  # ==========================================
  postgres:
    image: postgres:15.7-alpine
    container_name: apoe-postgres
    environment:
      POSTGRES_DB: enterprise_db
      POSTGRES_USER: apoe_user
      POSTGRES_PASSWORD: apoe_secure_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apoe_user -d enterprise_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: apoe-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: apoe-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ==========================================
  # SIMULATED APPLICATION SERVICES
  # ==========================================
  api-gateway:
    image: nginx:1.27-alpine
    container_name: apoe-api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      order-service:
        condition: service_healthy

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DB_CONN=postgres://apoe_user:apoe_secure_pass@postgres:5432/enterprise_db
      - REDIS_CONN=redis://redis:6379/0
      - KAFKA_BROKER=kafka:29092
      - OPENTELEMETRY_COLLECTOR_URL=http://otel-collector:4317
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=3)\""]
      <<: *py-health
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DB_CONN=postgres://apoe_user:apoe_secure_pass@postgres:5432/enterprise_db
      - REDIS_CONN=redis://redis:6379/0
      - KAFKA_BROKER=kafka:29092
      - OPENTELEMETRY_COLLECTOR_URL=http://otel-collector:4317
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8082/health', timeout=3)\""]
      <<: *py-health
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - KAFKA_BROKER=kafka:29092
      - OPENTELEMETRY_COLLECTOR_URL=http://otel-collector:4317
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8083/health', timeout=3)\""]
      <<: *py-health
    depends_on:
      kafka:
        condition: service_healthy

  # ==========================================
  # OBSERVABILITY BACKBONE (Simulated Telemetry)
  # ==========================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.82.0
    container_name: apoe-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./telemetry/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    # No shell in the contrib image; container liveness is the healthcheck.
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v2.46.0
    container_name: apoe-prometheus
    volumes:
      - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ==========================================
  # CHAOS INJECTOR (Failure Injector)
  # ==========================================
  chaos-injector:
    build:
      context: ./chaos-injector
    container_name: apoe-chaos-injector
    # No docker.sock mount: the injector only speaks SQL/Redis/Kafka/HTTP.
    environment:
      - TELEMETRY_PROMETHEUS=http://prometheus:9090
      - DB_CONN=postgres://apoe_user:apoe_secure_pass@postgres:5432/enterprise_db
      - REDIS_CONN=redis://redis:6379/0
      - KAFKA_BROKER=kafka:29092
    ports:
      - "9999:9999" # Rest endpoint to trigger chaos
    stop_grace_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9999/health', timeout=3)\""]
      <<: *py-health
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ==========================================
  # ACTIVE AGENT ORCHESTRATOR (APOE Brain)
  # ==========================================
  agent-orchestrator:
    build:
      context: ../agent-orchestrator
    container_name: apoe-agent-orchestrator
    ports:
      - "8085:8085"
    environment:
      - APOE_ENVIRONMENT=lab
      - APOE_PROMETHEUS_URL=http://prometheus:9090
      - APOE_POSTGRES_DSN=postgresql://apoe_user:apoe_secure_pass@postgres:5432/enterprise_db
      - APOE_REDIS_URL=redis://redis:6379/0
      - APOE_KAFKA_BOOTSTRAP=kafka:29092
      - APOE_CHAOS_INJECTOR_URL=http://chaos-injector:9999
      - APOE_OTEL_ENDPOINT=http://otel-collector:4317
      # Governance + LLM config from the host environment — no secrets here.
      - APOE_API_KEY=${APOE_API_KEY:-}
      - APOE_LLM_PROVIDER=${APOE_LLM_PROVIDER:-anthropic}
      - APOE_LLM_BASE_URL=${APOE_LLM_BASE_URL:-}
      - APOE_LLM_MODEL=${APOE_LLM_MODEL:-}
      - APOE_LLM_API_KEY=${APOE_LLM_API_KEY:-}
      - APOE_DRY_RUN=${APOE_DRY_RUN:-false}
    volumes:
      - apoe_data:/data
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/health', timeout=3)\""]
      <<: *py-health
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  apoe_data:
