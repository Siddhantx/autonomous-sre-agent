image:
  repository: apoe/agent-orchestrator   # push your build here
  tag: "2.0"
  pullPolicy: IfNotPresent

# Secrets are NEVER templated in this chart. Create one yourself:
#   kubectl create secret generic apoe-secrets \
#     --from-literal=APOE_API_KEY=... \
#     --from-literal=APOE_LLM_API_KEY=... \
#     --from-literal=APOE_POSTGRES_DSN=...
existingSecret: apoe-secrets

env:
  APOE_ENVIRONMENT: production
  APOE_PROMETHEUS_URL: http://prometheus.monitoring:9090
  APOE_LOKI_URL: http://loki.monitoring:3100
  APOE_K8S_API_URL: https://kubernetes.default.svc
  APOE_TOOL_PROVIDERS: all
  APOE_DRY_RUN: "true"   # start observed-only; flip after policy review

resources:
  limits:
    cpu: "1"
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

service:
  type: ClusterIP
  port: 8085

# Persist knowledge DB + audit log
persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
