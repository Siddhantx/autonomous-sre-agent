apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "apoe.fullname" . }}
  labels: {{- include "apoe.labels" . | nindent 4 }}
spec:
  replicas: 1   # blackboard + approval queue are in-process (see PONYTAIL-DEBT.md)
  selector:
    matchLabels:
      app.kubernetes.io/name: apoe
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels: {{- include "apoe.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "apoe.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      terminationGracePeriodSeconds: 30
      containers:
        - name: orchestrator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8085
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: 8085 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8085 }
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "apoe.fullname" . }}-data
      {{- end }}
