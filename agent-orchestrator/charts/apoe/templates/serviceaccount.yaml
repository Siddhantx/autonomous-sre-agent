apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "apoe.fullname" . }}
  labels: {{- include "apoe.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "apoe.fullname" . }}-readonly
  labels: {{- include "apoe.labels" . | nindent 4 }}
rules:
  # Strictly read-only: the investigator observes, it never mutates k8s.
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "apoe.fullname" . }}-readonly
  labels: {{- include "apoe.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "apoe.fullname" . }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "apoe.fullname" . }}
